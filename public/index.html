<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易经六十四卦 - 每日一卦</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1>易经六十四卦</h1>
                <button id="theme-toggle" class="theme-btn" title="切换深色模式">🌓</button>
            </div>
            <p class="subtitle">群经之首，大道之源</p>
        </header>

        <section class="daily-section">
            <h2>今日卦象</h2>
            <div id="daily-hexagram" class="daily-hexagram"></div>
            <div class="daily-actions">
                <button id="refresh-daily" class="btn btn-primary">重新起卦</button>
            </div>
        </section>

        <section class="all-hexagrams">
            <div class="section-header">
                <h2>六十四卦列表</h2>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索卦名...">
                </div>
            </div>
            <div id="hexagram-grid" class="hexagram-grid"></div>
            <div id="no-result" class="no-result" style="display: none;">
                <p>没有找到匹配的卦象</p>
            </div>
        </section>

        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div id="modal-body"></div>
            </div>
        </div>

        <footer>
            <p>易经 • 天行健，君子以自强不息；地势坤，君子以厚德载物</p>
        </footer>
    </div>

    <script src="hexagrams.js"></script>
    <script src="app.js"></script>
</body>
</html>
